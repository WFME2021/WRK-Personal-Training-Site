    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Christchurch Personal Trainer Specialising in Fat Loss | WRK</title>
    <meta name="description" content="Hayden Richards - WRK Personal Training. Expert 1:1 coaching and online programmes for busy professionals aged 35–60, across Christchurch and New Zealand." />
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              display: ['Bebas Neue', 'sans-serif'],
            },
            colors: {
              navy: {
                DEFAULT: '#023047',
                mid: '#0B425E',
                light: '#1A5070',
              },
              orange: {
                burnt: '#FB8500',
                hover: '#E07600',
              },
              white: '#FFFFFF',
              'off-white': '#F8FAFC',
              'grey-mid': '#8ECAE6',
              gold: {
                rule: '#FFB703',
              },
              // Keep original variables around but map to new colors if necessary,
              // or we can just use the variables defined below.
              primary: 'var(--bg-primary)',
              secondary: 'var(--bg-secondary)',
              'text-primary': 'var(--text-primary)',
              'text-secondary': 'var(--text-secondary)',
              border: 'var(--border)',
              accent: 'var(--accent)',
            },
            borderRadius: {
              '4xl': '2.5rem',
              '5xl': '3rem',
            },
            fontSize: {
              '10xl': '10rem',
              '11xl': '12rem',
              'massive': '14vw',
            }
          }
        }
      }
    </script>
    <style>
      :root, .dark {
        --bg-primary: #023047;   /* navy */
        --bg-secondary: #0A3B54; /* slightly lighter navy */
        --text-primary: #FFFFFF; /* white */
        --text-secondary: #8ECAE6; /* light blue */
        --border: #1A5070;       /* navy-light */
        --accent: #FFB703;       /* yellow */
      }

      body {
        font-family: 'Inter', sans-serif;
        background-color: var(--bg-primary);
        color: var(--text-primary);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow-x: hidden;
        width: 100%;
      }
      
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          transition-duration: 0.01ms !important;
        }
      }
      
      /* Smooth scrolling */
      html {
        scroll-behavior: smooth;
        overflow-x: hidden;
        width: 100%;
      }
      /* Custom Scrollbar */
      .custom-scrollbar::-webkit-scrollbar {
        width: 6px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: var(--bg-secondary); 
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: var(--border); 
        border-radius: 3px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: var(--text-secondary); 
      }
    </style>

  }
}
</script>
